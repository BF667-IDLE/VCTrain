name: Code Formatter

on:
  push:
    branches:
      - PolTrain
    paths:
      - '**/*.py'
      - '.github/workflows/code_formatter.yml'

jobs:
  format_code:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install ruff pyupgrade

      - name: Run pyupgrade
        run: pyupgrade --py311-plus . || true

      - name: Run Ruff Linter (with auto-fix)
        run: ruff check . --fix --target-version py311 --select ALL --no-preview || true

      - name: Run Ruff Formatter
        run: ruff format . --target-version py311 --line-length 140 --no-preview || true

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "style: автоматическое форматирование кода"
          title: "🎨 Автоматическое форматирование кода"
          body: "Этот PR создан автоматически для применения форматирования кода с помощью `Ruff` и `pyupgrade`."
          branch: "formatter/${{ github.ref_name }}"
          delete-branch: true
